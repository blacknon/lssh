name: Demo Test Job.

on:
  push:
  pull_request:

jobs:
  demo-e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Go 1.22
        uses: actions/setup-go@v6
        with:
          go-version: "1.22"
          cache: false

      - name: Run demo e2e test
        env:
          LSSH_RUN_DEMO_E2E: "1"
        run: go test -v ./demo -run TestDemoDockerComposeE2E
