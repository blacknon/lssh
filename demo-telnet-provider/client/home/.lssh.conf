[providers]
paths = ["~/.config/lssh/providers/provider-connector-telnet"]

[provider.telnet]
plugin = "provider-connector-telnet"
enabled = true
capabilities = ["connector"]
login_prompt = "login:"
password_prompt = "password:"
initial_newline = true

[common]
user = "demo"
pass = "demo-password"
port = "22"
key = "~/.ssh/demo_lssh_ed25519"
local_rc = "no"

[server.SshBastionOne]
addr = "172.41.0.31"
user = "demo"
port = "22"
key = "~/.ssh/demo_lssh_ed25519"
note = "first ssh bastion on the frontend network"

[server.SshBastionTwo]
addr = "172.41.1.41"
user = "demo"
port = "22"
key = "~/.ssh/demo_lssh_ed25519"
proxy_type = "ssh"
proxy = "SshBastionOne"
note = "second ssh bastion reachable only through SshBastionOne"

[server.TelnetDirect]
addr = "172.41.0.21"
port = "23"
connector_name = "telnet"
user = "demo"
pass = "demo-password"
note = "direct telnet target on the frontend network"

[server.TelnetViaDoubleSSH]
addr = "172.41.2.51"
port = "23"
connector_name = "telnet"
user = "demo"
pass = "demo-password"
proxy_type = "ssh"
proxy = "SshBastionTwo"
note = "telnet target reachable only through SshBastionOne -> SshBastionTwo"
