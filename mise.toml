# Enviroment
# ====================
# [env]
# mise.file = "env"

# Tasks(full)
# ====================
[tasks.full_build]
description = "Build binary files all"
depends = ["core_build", "transfer_build", "monitor_build", "sysadmin_build"]

[tasks.full_install]
description = "Install binary files all"
depends = [
    "core_install",
    "transfer_install",
    "monitor_install",
    "sysadmin_install",
]

[tasks.completion_install]
description = "Install shell completion files for bash, zsh, and fish to the user profile"
depends = []
run = """
    mkdir -p "$HOME/.local/share/bash-completion/completions"
    cp completion/bash/* "$HOME/.local/share/bash-completion/completions/"

    mkdir -p "$HOME/.zfunc"
    cp completion/zsh/* "$HOME/.zfunc/"

    mkdir -p "$HOME/.config/fish/completions"
    cp completion/fish/* "$HOME/.config/fish/completions/"

    printf '%s\n' \
      'zsh note:' \
      '  Add this to ~/.zshrc if ~/.zfunc is not already in fpath:' \
      '    fpath=($HOME/.zfunc $fpath)' \
      '    autoload -Uz compinit && compinit'
"""

[tasks.completion_install_system]
description = "Install shell completion files for bash, zsh, and fish under /usr/local"
depends = []
run = """
    mkdir -p /usr/local/share/bash-completion/completions
    cp completion/bash/* /usr/local/share/bash-completion/completions/

    mkdir -p /usr/local/share/zsh/site-functions
    cp completion/zsh/* /usr/local/share/zsh/site-functions/

    mkdir -p /usr/local/share/fish/vendor_completions.d
    cp completion/fish/* /usr/local/share/fish/vendor_completions.d/
"""

[tasks.full_test]
description = "Run go test for all"
depends = ["core_test", "transfer_test", "monitor_test", "sysadmin_test"]

# Tasks(go module)
# ====================
[tasks.go_mod]
description = "Run go mod tidy"
depends = []
run = """
    go mod tidy
    go mod vendor
"""

# Tasks(core)
# Note: Coreは、lsshのみを対象とするタスク。
# ====================
[tasks.core_build]
description = "Build binary file only lssh"
depends = ["core_clean", "go_mod"]
run = """
    go build -o lssh ./cmd/lssh
"""

[tasks.core_clean]
description = "Clean binary file only lssh"
depends = []
run = """
    rm -f lssh
"""

[tasks.core_install]
description = "Install binary file only lssh"
depends = ["core_build"]
run = """
    cp lssh /usr/local/bin/lssh
"""

[tasks.core_test]
description = "Run go test for lssh"
depends = ["go_mod"]
run = """
    go test -v ./internal/app/lssh/...
"""


# Tasks(Transfer)
# Note: Transferは、lscpとlsftpとlssyncを対象とするタスク。これらはcoreに含まれるため、coreのタスクでビルド・インストールされる。
# ====================
[tasks.transfer_build]
description = "Build binary file only lscp, lsftp, lssync, lsdiff, and lsshfs"
depends = ["transfer_clean", "go_mod"]
run = """
    go build -o lscp ./cmd/lscp
    go build -o lsftp ./cmd/lsftp
    go build -o lssync ./cmd/lssync
    go build -o lsdiff ./cmd/lsdiff
    go build -o lsshfs ./cmd/lsshfs
"""

[tasks.transfer_clean]
description = "Clean binary file only lscp, lsftp, lssync, lsdiff, and lsshfs"
depends = []
run = """
    rm -f lscp
    rm -f lsftp
    rm -f lssync
    rm -f lsdiff
    rm -f lsshfs
"""

[tasks.transfer_install]
description = "Install binary file only lscp, lsftp, lssync, lsdiff, and lsshfs"
depends = ["transfer_build"]
run = """
    cp lscp /usr/local/bin/lscp
    cp lsftp /usr/local/bin/lsftp
    cp lssync /usr/local/bin/lssync
    cp lsdiff /usr/local/bin/lsdiff
    cp lsshfs /usr/local/bin/lsshfs
"""

[tasks.transfer_test]
description = "Run go test for lscp, lsftp, lssync, lsdiff, and lsshfs"
depends = ["go_mod"]
run = """
    go test -v ./internal/app/lscp/...
    go test -v ./internal/app/lsftp/...
    go test -v ./internal/app/lssync/...
    go test -v ./internal/app/lsdiff/...
    go test -v ./internal/lsdiff/...
    go test -v ./internal/app/lsshfs/...
    go test -v ./internal/lsshfs/...
    go test -v ./internal/sync/...
"""


# Tasks(Monitor)
# Note: Monitorは、lsmonのみを対象とするタスク。lsmonはcoreに含まれるため、coreのタスクでビルド・インストールされる。
# ====================
[tasks.monitor_build]
description = "Build binary file only lsmon"
depends = ["monitor_clean", "go_mod"]
run = """
    go build -o lsmon ./cmd/lsmon
"""

[tasks.monitor_clean]
description = "Clean binary file only lsmon"
depends = []
run = """
    rm -f lsmon
"""

[tasks.monitor_install]
description = "Install binary file only lsmon"
depends = ["monitor_build"]
run = """
    cp lsmon /usr/local/bin/lsmon
"""

[tasks.monitor_test]
description = "Run go test for lsmon"
depends = ["go_mod"]
run = """
    go test -v ./internal/app/lsmon/...
"""


# Tasks(Sysadmin)
# Note: Sysadminは、lsshell, lsmuxのみを対象とするタスク。lsshはcoreに含まれるため、coreのタスクでビルド・インストールされる。
# ====================
[tasks.sysadmin_build]
description = "Build binary files only lsshell, lsmux, and lspipe"
depends = ["sysadmin_clean", "go_mod"]
run = """
    go build -o lsshell ./cmd/lsshell
    go build -o lsmux ./cmd/lsmux
    go build -o lspipe ./cmd/lspipe
"""

[tasks.sysadmin_clean]
description = "Clean binary files only lsshell, lsmux, and lspipe"
depends = []
run = """
    rm -f lsshell
    rm -f lsmux
    rm -f lspipe
"""

[tasks.sysadmin_install]
description = "Install binary files only lsshell, lsmux, and lspipe"
depends = ["sysadmin_build"]
run = """
    cp lsshell /usr/local/bin/lsshell
    cp lsmux /usr/local/bin/lsmux
    cp lspipe /usr/local/bin/lspipe
"""

[tasks.sysadmin_test]
description = "Run go test for lsshell, lsmux, and lspipe"
depends = ["go_mod"]
run = """
    go test -v ./internal/app/lsshell/...
    go test -v ./internal/app/lsmux/...
    go test -v ./internal/app/lspipe/...
    go test -v ./internal/lspipe/...
"""

# Tasks(Demo)
# ====================
[tasks.demo_up]
description = "Start demo containers with docker compose"
depends = []
dir = "demo"
run = """
    docker compose up --build -d
"""

[tasks.demo_down]
description = "Stop demo containers with docker compose"
depends = []
dir = "demo"
run = """
    docker compose down -v
"""

[tasks.demo_client]
description = "Open a shell in the demo client container"
depends = ["demo_up"]
dir = "demo"
run = """
    docker compose exec --user demo client bash
"""

[tasks.demo_ssh]
description = "Connect to the demo client bastion over SSH and start lssh"
depends = ["demo_up"]
run = """
    ssh -t -p 2222 -i demo/client/home/.ssh/demo_lssh_ed25519 demo@127.0.0.1
"""

[tasks.demo_ssh_list]
description = "List demo bastion targets through the forced lssh command"
depends = ["demo_up"]
run = """
    ssh -p 2222 -i demo/client/home/.ssh/demo_lssh_ed25519 demo@127.0.0.1 -- --list
"""
