# Enviroment
# ====================
# [env]
# mise.file = "env"

# Tasks(full)
# ====================
[tasks.full_build]
description = "Build binary files all"
depends = [
    "core_build",
    "transfer_build",
    "monitor_build",
    "sysadmin_build",
    "provider_build",
]

[tasks.full_install]
description = "Install binary files all"
depends = [
    "core_install",
    "transfer_install",
    "monitor_install",
    "sysadmin_install",
    "provider_install",
]

[tasks.completion_install]
description = "Install shell completion files for bash, zsh, and fish to the user profile"
depends = []
run = """
    mkdir -p "$HOME/.local/share/bash-completion/completions"
    cp completion/bash/* "$HOME/.local/share/bash-completion/completions/"

    mkdir -p "$HOME/.zfunc"
    cp completion/zsh/* "$HOME/.zfunc/"

    mkdir -p "$HOME/.config/fish/completions"
    cp completion/fish/* "$HOME/.config/fish/completions/"

    printf '%s\n' \
      'zsh note:' \
      '  Add this to ~/.zshrc if ~/.zfunc is not already in fpath:' \
      '    fpath=($HOME/.zfunc $fpath)' \
      '    autoload -Uz compinit && compinit'
"""

[tasks.completion_install_system]
description = "Install shell completion files for bash, zsh, and fish under /usr/local"
depends = []
run = """
    mkdir -p /usr/local/share/bash-completion/completions
    cp completion/bash/* /usr/local/share/bash-completion/completions/

    mkdir -p /usr/local/share/zsh/site-functions
    cp completion/zsh/* /usr/local/share/zsh/site-functions/

    mkdir -p /usr/local/share/fish/vendor_completions.d
    cp completion/fish/* /usr/local/share/fish/vendor_completions.d/
"""

[tasks.full_test]
description = "Run go test for all"
depends = [
    "core_test",
    "transfer_test",
    "monitor_test",
    "sysadmin_test",
    "provider_test",
]

# Tasks(go module)
# ====================
[tasks.go_mod]
description = "Run go mod tidy"
depends = []
run = """
    go mod tidy
    if [ -d vendor/github.com/bitwarden/sdk-go/internal/cinterface/lib ]; then
        chmod -R u+w vendor/github.com/bitwarden/sdk-go/internal/cinterface/lib
        rm -rf vendor/github.com/bitwarden/sdk-go/internal/cinterface/lib
    fi
    go mod vendor
    BITWARDEN_SDK_DIR="$(find "$(go env GOMODCACHE)/github.com/bitwarden" -maxdepth 1 -type d -name 'sdk-go@*' | head -n 1)"
    if [ -n "$BITWARDEN_SDK_DIR" ] && [ -d "$BITWARDEN_SDK_DIR/internal/cinterface/lib" ]; then
        mkdir -p vendor/github.com/bitwarden/sdk-go/internal/cinterface
        cp -R "$BITWARDEN_SDK_DIR/internal/cinterface/lib" vendor/github.com/bitwarden/sdk-go/internal/cinterface/lib
        chmod -R u+w vendor/github.com/bitwarden/sdk-go/internal/cinterface/lib
    fi
"""

# Tasks(Provider)
# Note: Providerは、mixed/connector/inventory/secret provider executableを対象とするタスク。
# ====================
[tasks.provider_build]
description = "Build provider binaries"
depends = ["provider_clean", "go_mod"]
run = """
    go build -o provider-mixed-aws-ec2 ./provider/mixed/provider-mixed-aws-ec2
    go build -o provider-connector-openssh ./provider/connector/provider-connector-openssh
    go build -o provider-connector-telnet ./provider/connector/provider-connector-telnet
    go build -o provider-connector-winrm ./provider/connector/provider-connector-winrm
    go build -o provider-mixed-azure-compute ./provider/mixed/provider-mixed-azure-compute
    go build -o provider-inventory-azure-compute ./provider/mixed/provider-mixed-azure-compute
    go build -o provider-mixed-gcp-compute ./provider/mixed/provider-mixed-gcp-compute
    go build -o provider-inventory-gcp-compute ./provider/mixed/provider-mixed-gcp-compute
    go build -o provider-inventory-proxmox ./provider/inventory/provider-inventory-proxmox
    go build -o provider-secret-onepassword ./provider/secret/provider-secret-onepassword
    go build -o provider-secret-bitwarden ./provider/secret/provider-secret-bitwarden
    go build -o provider-secret-os-keychain ./provider/secret/provider-secret-os-keychain
    go build -o provider-secret-custom-script ./provider/secret/provider-secret-custom-script
"""

[tasks.provider_clean]
description = "Clean provider binaries"
depends = []
run = """
    rm -f provider-mixed-aws-ec2
    rm -f provider-connector-openssh
    rm -f provider-connector-telnet
    rm -f provider-connector-winrm
    rm -f provider-mixed-azure-compute
    rm -f provider-inventory-azure-compute
    rm -f provider-mixed-gcp-compute
    rm -f provider-inventory-gcp-compute
    rm -f provider-inventory-proxmox
    rm -f provider-secret-onepassword
    rm -f provider-secret-bitwarden
    rm -f provider-secret-os-keychain
    rm -f provider-secret-custom-script
"""

[tasks.provider_install]
description = "Install provider binaries into ~/.config/lssh/providers"
depends = ["provider_build"]
run = """
    install_binary() {
        src="$1"
        dst="$2"
        dir="$(dirname "$dst")"
        tmp="$dir/.$(basename "$dst").tmp.$$"

        cp "$src" "$tmp"
        xattr -d com.apple.provenance "$tmp" 2>/dev/null || true
        codesign --force --sign - "$tmp"
        mv -f "$tmp" "$dst"
    }

    mkdir -p "$HOME/.config/lssh/providers"
    rm -f "$HOME/.config/lssh/providers/provider-connector-psrp"
    install_binary provider-mixed-aws-ec2 "$HOME/.config/lssh/providers/provider-mixed-aws-ec2"
    install_binary provider-connector-openssh "$HOME/.config/lssh/providers/provider-connector-openssh"
    install_binary provider-connector-telnet "$HOME/.config/lssh/providers/provider-connector-telnet"
    install_binary provider-connector-winrm "$HOME/.config/lssh/providers/provider-connector-winrm"
    install_binary provider-mixed-azure-compute "$HOME/.config/lssh/providers/provider-mixed-azure-compute"
    install_binary provider-inventory-azure-compute "$HOME/.config/lssh/providers/provider-inventory-azure-compute"
    install_binary provider-mixed-gcp-compute "$HOME/.config/lssh/providers/provider-mixed-gcp-compute"
    install_binary provider-inventory-gcp-compute "$HOME/.config/lssh/providers/provider-inventory-gcp-compute"
    install_binary provider-inventory-proxmox "$HOME/.config/lssh/providers/provider-inventory-proxmox"
    install_binary provider-secret-onepassword "$HOME/.config/lssh/providers/provider-secret-onepassword"
    install_binary provider-secret-bitwarden "$HOME/.config/lssh/providers/provider-secret-bitwarden"
    install_binary provider-secret-os-keychain "$HOME/.config/lssh/providers/provider-secret-os-keychain"
    install_binary provider-secret-custom-script "$HOME/.config/lssh/providers/provider-secret-custom-script"
"""

[tasks.provider_test]
description = "Run go test for provider packages"
depends = ["go_mod"]
run = """
    go test -v ./provider/mixed/provider-mixed-aws-ec2
    go test -v ./provider/connector/provider-connector-openssh
    go test -v ./provider/connector/provider-connector-telnet
    go test -v ./provider/connector/provider-connector-winrm
    go test -v ./provider/mixed/provider-mixed-azure-compute
    go test -v ./provider/mixed/provider-mixed-gcp-compute
    go test -v ./provider/inventory/provider-inventory-proxmox
    go test -v ./provider/secret/provider-secret-onepassword
    go test -v ./provider/secret/provider-secret-bitwarden
    go test -v ./provider/secret/provider-secret-os-keychain
    go test -v ./provider/secret/provider-secret-custom-script
"""

# Tasks(core)
# Note: Coreは、lsshのみを対象とするタスク。
# ====================
[tasks.core_build]
description = "Build binary file only lssh"
depends = ["core_clean", "go_mod"]
run = """
    go build -o lssh ./cmd/lssh
"""

[tasks.core_clean]
description = "Clean binary file only lssh"
depends = []
run = """
    rm -f lssh
"""

[tasks.core_install]
description = "Install binary file only lssh"
depends = ["core_build"]
run = """
    install_binary() {
        src="$1"
        dst="$2"
        dir="$(dirname "$dst")"
        tmp="$dir/.$(basename "$dst").tmp.$$"

        cp "$src" "$tmp"
        xattr -d com.apple.provenance "$tmp" 2>/dev/null || true
        codesign --force --sign - "$tmp"
        mv -f "$tmp" "$dst"
    }

    install_binary lssh /usr/local/bin/lssh
"""

[tasks.core_test]
description = "Run go test for lssh"
depends = ["go_mod"]
run = """
    go test -v ./internal/app/lssh/...
"""


# Tasks(Transfer)
