depends = ["transfer_build"]
run = """
    install_binary() {
        src="$1"
        dst="$2"
        dir="$(dirname "$dst")"
        tmp="$dir/.$(basename "$dst").tmp.$$"

        cp "$src" "$tmp"
        xattr -d com.apple.provenance "$tmp" 2>/dev/null || true
        codesign --force --sign - "$tmp"
        mv -f "$tmp" "$dst"
    }

    install_binary lscp /usr/local/bin/lscp
    install_binary lsftp /usr/local/bin/lsftp
    install_binary lssync /usr/local/bin/lssync
    install_binary lsdiff /usr/local/bin/lsdiff
    install_binary lsshfs /usr/local/bin/lsshfs
"""

[tasks.transfer_test]
description = "Run go test for lscp, lsftp, lssync, lsdiff, and lsshfs"
depends = ["go_mod"]
run = """
    go test -v ./internal/app/lscp/...
    go test -v ./internal/app/lsftp/...
    go test -v ./internal/app/lssync/...
    go test -v ./internal/app/lsdiff/...
    go test -v ./internal/lsdiff/...
    go test -v ./internal/app/lsshfs/...
    go test -v ./internal/lsshfs/...
    go test -v ./internal/sync/...
"""


