# Tasks(Demo)
# ====================
[tasks.demo_up]
description = "Start demo containers with docker compose"
depends = []
dir = "demo"
run = """
    docker compose up --build -d
"""

[tasks.demo_down]
description = "Stop demo containers with docker compose"
depends = []
dir = "demo"
run = """
    docker compose down -v
"""

[tasks.demo_client]
description = "Open a shell in the demo client container"
depends = ["demo_up"]
dir = "demo"
run = """
    docker compose exec --user demo client bash
"""

[tasks.demo_telnet_provider_up]
description = "Start the telnet provider demo containers with docker compose"
depends = []
dir = "demo-telnet-provider"
run = """
    docker compose up -d --build
"""

[tasks.demo_telnet_provider_down]
description = "Stop the telnet provider demo containers with docker compose"
depends = []
dir = "demo-telnet-provider"
run = """
    docker compose down -v
"""

[tasks.demo_telnet_provider_client]
description = "Open a shell in the telnet provider demo client container"
depends = ["demo_telnet_provider_up"]
dir = "demo-telnet-provider"
run = """
    docker compose exec --user demo client bash
"""

[tasks.demo_ssh]
description = "Connect to the demo client bastion over SSH and start lssh"
depends = ["demo_up"]
run = """
    ssh -t -p 2222 -i demo/client/home/.ssh/demo_lssh_ed25519 demo@127.0.0.1
"""

[tasks.demo_ssh_list]
description = "List demo bastion targets through the forced lssh command"
depends = ["demo_up"]
run = """
    ssh -p 2222 -i demo/client/home/.ssh/demo_lssh_ed25519 demo@127.0.0.1 -- --list
"""

[tasks.generate-gif]
description = "generate hwatch.gif"
run = """
vhs images/demo.tape -o images/demo.gif
vhs images/example_lssh.tape -o images/example_lssh.gif
vhs images/example_lssh_parallel.tape -o images/example_lssh_parallel.gif
vhs images/example_lssh_mux.tape -o images/example_lssh_mux.gif
vhs images/example_lssh_mux_command.tape -o images/example_lssh_mux_command.gif
"""
